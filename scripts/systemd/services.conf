# =============================================================================
# AgentOps — systemd Service Templates
# Copy to /etc/systemd/system/ and adjust paths.
# After copying: sudo systemctl daemon-reload
# =============================================================================

# --- Target App (Production, Port 9000) ---
# File: /etc/systemd/system/agentops-target-prod.service

[Unit]
Description=AgentOps Target App (Production)
After=network.target

[Service]
Type=simple
User=ubuntu
WorkingDirectory=/opt/agentops/target-app
Environment=APP_CONFIG=/opt/agentops/configs/production.json
Environment=TARGET_APP_PROD_PORT=9000
EnvironmentFile=/opt/agentops/.env
ExecStart=/opt/agentops/target-app/venv/bin/python -m uvicorn app:app --host 0.0.0.0 --port $TARGET_APP_PROD_PORT
Restart=always
RestartSec=5
StandardOutput=append:/var/log/agentops/target-prod.log
StandardError=append:/var/log/agentops/target-prod.error.log

[Install]
WantedBy=multi-user.target

