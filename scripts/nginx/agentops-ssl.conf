# =============================================================================
# AgentOps — HTTPS server (optional)
# Include only after provisioning TLS certs so nginx -t does not fail on deploy.
# In agentops.conf add: include /etc/nginx/sites-available/agentops-ssl.conf;
# =============================================================================

server {
    listen 443 ssl;
    server_name _;  # Replace with real domain or Elastic IP

    ssl_certificate     /etc/ssl/certs/agentops.crt;
    ssl_certificate_key /etc/ssl/private/agentops.key;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /pipeline/trigger {
        proxy_pass http://127.0.0.1:7000/trigger;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
    }

    location /storage/mcp {
        proxy_pass http://127.0.0.1:8000/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /monitor/mcp {
        proxy_pass http://127.0.0.1:8001/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /deploy/mcp {
        proxy_pass http://127.0.0.1:8002/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://127.0.0.1:9000/health;
    }
}
