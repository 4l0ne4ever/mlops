# =============================================================================
# AgentOps — nginx Reverse Proxy Configuration
# Copy to: /etc/nginx/sites-available/agentops
# Link:    sudo ln -sf /etc/nginx/sites-available/agentops /etc/nginx/sites-enabled/
# Reload:  sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

server {
    listen 80;
    server_name _;  # Replace with domain or Elastic IP if available

    # --- Dashboard (public) ---
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # --- Orchestrator trigger endpoint (Lambda → EC2) ---
    # Lambda Function URL should call http://<EC2_IP>/pipeline/trigger
    # This block forwards to the orchestrator FastAPI app's /trigger route.
    location /pipeline/trigger {
        proxy_pass http://127.0.0.1:7000/trigger;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;  # Eval pipeline can take up to 10 min
    }

    # --- Target App Production (external access if needed) ---
    location /api/translate {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- MCP Servers (internal only — block external access) ---
    # MCP servers communicate via localhost only.
    # If you need external MCP access (e.g., from local dev), remove deny.
    location /mcp/ {
        deny all;
        return 403;
    }

    # --- Health check endpoint ---
    location /health {
        proxy_pass http://127.0.0.1:9000/health;
    }
}

# Optional HTTPS: only loaded when certs exist to avoid nginx -t failures on deploy.
# 1. Provision certs (e.g. /etc/ssl/certs/agentops.crt and /etc/ssl/private/agentops.key).
# 2. Copy agentops-ssl.conf to /etc/nginx/sites-available/ and adjust cert paths if needed.
# 3. Add in this file (above): include /etc/nginx/sites-available/agentops-ssl.conf;
# 4. sudo nginx -t && sudo systemctl reload nginx
