# =============================================================================
# AgentOps — nginx Reverse Proxy Configuration
# Copy to: /etc/nginx/sites-available/agentops
# Link:    sudo ln -sf /etc/nginx/sites-available/agentops /etc/nginx/sites-enabled/
# Reload:  sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

server {
    listen 80;
    server_name _;  # Replace with domain or Elastic IP if available

    # --- Dashboard (public) ---
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # --- Orchestrator trigger endpoint (Lambda → EC2) ---
    location /pipeline/ {
        proxy_pass http://127.0.0.1:7000/pipeline/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;  # Eval pipeline can take up to 10 min
    }

    # --- Target App Production (external access if needed) ---
    location /api/translate {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- MCP Servers (internal only — block external access) ---
    # MCP servers communicate via localhost only.
    # If you need external MCP access (e.g., from local dev), remove deny.
    location /mcp/ {
        deny all;
        return 403;
    }

    # --- Health check endpoint ---
    location /health {
        proxy_pass http://127.0.0.1:9000/health;
    }
}
